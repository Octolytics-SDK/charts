{{- if .Values.externalSecrets.enabled -}}
{{- $root := . -}}
{{- $globalSecrets := default (list) .Values.secrets -}}
{{- if gt (len $globalSecrets) 0 }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "octo-apps.globalSecretName" . }}
  labels:
    {{- include "octo-apps.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    {{- toYaml .Values.externalSecrets.secretStoreRef | nindent 4 }}
  target:
    name: {{ include "octo-apps.globalSecretName" . }}
    {{- with .Values.externalSecrets.target }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  data:
{{- include "octo-apps.externalSecretData" (dict "secrets" $globalSecrets) | trim | nindent 4 }}
{{- end }}
{{- range $container := .Values.containers }}
{{- $containerSecrets := default (list) $container.secrets }}
{{- if gt (len $containerSecrets) 0 }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "octo-apps.containerSecretName" (dict "root" $root "container" $container) }}
  labels:
    {{- include "octo-apps.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $container.name }}
spec:
  refreshInterval: {{ $root.Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    {{- toYaml $root.Values.externalSecrets.secretStoreRef | nindent 4 }}
  target:
    name: {{ include "octo-apps.containerSecretName" (dict "root" $root "container" $container) }}
    {{- with $root.Values.externalSecrets.target }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  data:
{{- include "octo-apps.externalSecretData" (dict "secrets" $containerSecrets) | trim | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
